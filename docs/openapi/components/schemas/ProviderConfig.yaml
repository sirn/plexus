type: object
description: >
  Provider configuration. Used to define upstream LLM providers that Plexus
  can route requests to. Stored in the database.
  `providers` section.
required:
  - api_base_url
properties:
  display_name:
    type: string
    description: >
      Optional human-readable label for this provider shown in the admin UI.
  api_base_url:
    oneOf:
      - type: string
        format: uri
        description: >
          Base URL for all requests to this provider (e.g.
          `https://api.openai.com/v1`). May also be an `oauth://` URI for
          OAuth-authenticated providers.
      - type: object
        additionalProperties:
          type: string
        description: >
          Map of inference-type → URL when a single provider exposes multiple
          API surfaces at different endpoints. Keys are the inference type
          strings (`chat`, `embeddings`, etc.).
    description: >
      Provider base URL. Either a single URL string or a map of
      inference-type → URL for providers with multiple surfaces. Accepts
      `oauth://` URIs for OAuth-authenticated providers.
  api_key:
    type: string
    description: >
      API key for the provider. Can be a literal string or
      `$env:VARIABLE_NAME` to reference an environment variable. Required
      unless `api_base_url` is an `oauth://` URI.
  oauth_provider:
    type: string
    enum:
      - anthropic
      - openai-codex
      - github-copilot
      - google-gemini-cli
      - google-antigravity
    description: >
      OAuth provider identifier. Required when `api_base_url` uses an
      `oauth://` URI. Determines which OAuth flow is used to obtain
      credentials.
  oauth_account:
    type: string
    description: >
      OAuth account identifier. Required when `api_base_url` uses an
      `oauth://` URI.
  enabled:
    type: boolean
    default: true
    description: >
      When false, this provider is excluded from all routing decisions.
  disable_cooldown:
    type: boolean
    default: false
    description: >
      When true, disables automatic cooldown for this provider. Failed
      requests won't trigger exponential backoff. Use with caution.
  discount:
    type: number
    minimum: 0
    maximum: 1
    description: >
      Cost discount factor applied to usage records for this provider.
      `0` means no reduction, `1` means 100% discount (free). Used to
      reflect negotiated discounts in cost calculations.
  models:
    oneOf:
      - type: array
        items:
          type: string
        description: >
          Simple list of model IDs this provider exposes. Used for model
          discovery only; does not restrict routing.
      - type: object
        additionalProperties:
          type: object
          properties:
            pricing:
              type: object
              description: Pricing configuration for this specific model.
            access_via:
              type: array
              items:
                type: string
              description: Alternative names this model can be accessed under.
            type:
              type: string
              enum:
                - chat
                - responses
                - embeddings
                - transcriptions
                - speech
                - image
            extraBody:
              type: object
              additionalProperties: true
              description: Extra fields merged into the request body for this model.
            adapter:
              oneOf:
                - type: string
                - type: array
                  items:
                    oneOf:
                      - type: string
                      - type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                            description: Adapter name.
                          options:
                            type: object
                            additionalProperties: true
                            description: Adapter-specific options.
              description: >
                Adapter name(s) applied to this specific model. Appended after
                any provider-level adapters. Accepts bare strings or
                `{ name, options }` objects for parameterized adapters
                (e.g. `model_override` with rules). See the provider-level
                `adapter` field for available values.
        description: >
          Map of model ID → per-model configuration. Allows per-model pricing
          overrides and access aliases.
    description: >
      Models available on this provider. Either a simple list of IDs or a map
      of model ID → configuration for per-model pricing/type overrides.
  headers:
    type: object
    additionalProperties:
      type: string
    description: >
      Static headers forwarded on every request to this provider. Useful for
      custom authentication schemes or provider-specific requirements.
  extraBody:
    type: object
    additionalProperties: true
    description: >
      Extra fields merged into every request body sent to this provider.
  estimateTokens:
    type: boolean
    default: false
    description: >
      When true, token counts are estimated locally rather than relying on
      the provider's response. Useful for providers that omit usage fields.
  useClaudeMasking:
    type: boolean
    default: false
    description: >
      When true, rewrites OpenAI-format requests to look like Claude requests
      before forwarding. Used for providers that require Anthropic-compatible
      request shapes.
  quota_checker:
    type: object
    description: >
      Optional provider-level quota checker configuration. References a
      quota checker type from `GET /v0/management/quota-checker-types`.
    additionalProperties: true
  gpu_profile:
    type: string
    description: >
      Named GPU profile (e.g. `H100`, `A100`, `custom`). A display hint
      used by the frontend; the backend uses the four numeric fields below
      as the source of truth.
  gpu_ram_gb:
    type: number
    description: >
      GPU RAM in GB. Used for energy estimation when combined with
      model_architecture.
  gpu_bandwidth_tb_s:
    type: number
    description: GPU memory bandwidth in TB/s. Used for energy estimation.
  gpu_flops_tflop:
    type: number
    description: GPU peak FLOPs in teraflops. Used for energy estimation.
  gpu_power_draw_watts:
    type: number
    description: GPU TDP in watts. Used for energy estimation.
  adapter:
    oneOf:
      - type: string
      - type: array
        items:
          oneOf:
            - type: string
            - type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Adapter name.
                options:
                  type: object
                  additionalProperties: true
                  description: Adapter-specific options.
    description: >
      Adapter name(s) applied to every model under this provider.
      Adapters rewrite outbound request payloads (preDispatch) and inbound
      provider responses (postDispatch) to fix provider-specific field-name
      incompatibilities. Applied before model-level adapters.

      Adapters can be specified as bare strings (backward compatible) or as
      objects with `{ name, options }` for adapters that require configuration.

      Available adapters:

      - `reasoning_content` — Renames `reasoning`/`thinking.content` →
        `reasoning_content` on outbound assistant messages. Fixes Fireworks/
        DeepSeek providers that reject the `reasoning` field name.

      - `suppress_developer_role` — Rewrites the `developer` role to `system`
        for providers that do not support the OpenAI `developer` role.

      - `model_override` — Conditionally rewrites the provider model name
        based on request payload fields. Accepts a `rules` array in options
        where each rule specifies a `model` to match, a `rewriteTo` model name,
        and an array of `conditions` (OR semantics) using dotted field paths.
        Used for providers that expose reasoning variants as separate model
        names rather than respecting reasoning-related request fields.

      - `reasoning_rewrite` — Declaratively rewrites reasoning/thinking fields
        in outbound request payloads. Different providers accept reasoning
        effort via different field names (e.g. `enable_thinking`, `thinking.type`,
        `chat_template_kwargs.enable_thinking`, `budget_tokens`, `thinking_budget`).
        This adapter maps from unified fields (e.g. `reasoning.enabled`,
        `reasoning.effort`) to provider-specific formats. Accepts a `rules`
        array in options where each rule specifies a `source` dotted path,
        an optional `when` condition (with `op` and `value`), an array of
        `rewrites` (each with `target` and `value`), and optional `strip`
        paths to remove after rewriting.

      Pass-through optimisation is automatically disabled when any adapter
      is active.
  timeoutMs:
    type: integer
    minimum: 1
    description: >
      Optional per-provider upstream request timeout in milliseconds.
      When omitted, Plexus uses the global timeout from
      `/v0/management/config/timeout`.
  stallTtfbMs:
    type:
      - integer
      - 'null'
    minimum: 5000
    maximum: 120000
    description: >
      Optional per-provider TTFB stall timeout override in milliseconds.
      Omit to inherit the global value. `null` disables TTFB stall detection
      for this provider.
  stallTtfbBytes:
    type:
      - integer
      - 'null'
    minimum: 50
    maximum: 10000
    description: >
      Optional per-provider byte threshold used to confirm meaningful first
      output for stall detection. Omit to inherit the global value.
  stallMinBps:
    type:
      - integer
      - 'null'
    minimum: 50
    maximum: 5000
    description: >
      Optional per-provider minimum throughput override in bytes per second.
      Omit to inherit the global value. `null` disables throughput stall
      detection for this provider.
  stallWindowMs:
    type:
      - integer
      - 'null'
    minimum: 3000
    maximum: 30000
    description: >
      Optional per-provider sliding-window width for throughput stall
      detection, in milliseconds. Omit to inherit the global value.
  stallGracePeriodMs:
    type:
      - integer
      - 'null'
    minimum: 0
    maximum: 120000
    description: >
      Optional per-provider grace period before throughput stall detection
      starts, in milliseconds. Omit to inherit the global value.
